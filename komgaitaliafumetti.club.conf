# HTTP server for komgaitaliafumetti.club
server {
    listen 80;
    server_name komgaitaliafumetti.club www.komgaitaliafumetti.club;

    # Health check
    location /nginx-health {
        return 200 "nginx main server healthy - komgaitaliafumetti.club active\n";
        add_header Content-Type text/plain;
    }

    # Proxy to host-published service (hemingway-menu on 8083)
    location / {
        proxy_pass http://94.130.14.32:8083;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }
}

