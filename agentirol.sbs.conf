# HTTP server for agentirol.sbs
server {
    listen 80;
    server_name agentirol.sbs www.agentirol.sbs;
    location /nginx-health {
        return 200 "nginx main server healthy - agentirol.sbs active\n";
        add_header Content-Type text/plain;
    }
    location / {
        proxy_pass http://65.21.251.106:8090;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }
}
# HTTPS server for agentirol.sbs
server {
    listen 443 ssl;
    server_name agentirol.sbs www.agentirol.sbs;
    ssl_certificate     /etc/nginx/ssl/letsencrypt-fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/letsencrypt-privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    location /nginx-health {
        return 200 "nginx main server healthy (HTTPS) - agentirol.sbs active\n";
        add_header Content-Type text/plain;
    }
    location / {
        proxy_pass http://65.21.251.106:8090;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }
}
