events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Redirect automatico da porta 80 a 443 (HTTPS)
    server {
        listen 80;
        server_name agentirol.sbs www.agentirol.sbs;
        return 301 https://$host$request_uri;
    }

    # Configurazione HTTPS
    server {
        listen 443 ssl;
        server_name agentirol.sbs www.agentirol.sbs;

        # Percorsi dei certificati generati da Certbot
        ssl_certificate     /etc/letsencrypt/live/agentirol.sbs/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/agentirol.sbs/privkey.pem;

        # Ottimizzazioni SSL
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        location / {
            # Puntamento al container dell'app tramite IP interno
            proxy_pass http://172.18.0.2:80; 
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
