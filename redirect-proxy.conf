events {
    worker_connections 1024;
}

http {
    # Configurazione di base
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    
    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Server per redirect pulito
    server {
        listen 80;
        server_name agentirol.sbs www.agentirol.sbs;
        
        # Health check per il proxy
        location /proxy-health {
            return 200 "redirect-proxy healthy";
            add_header Content-Type text/plain;
        }
        
        # Redirect trasparente verso l'applicazione principale
        location / {
            # Proxy pass verso il container nginx-proxy principale
            proxy_pass http://nginx-proxy:80;
            
            # Headers per mantenere il contesto
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Timeout configuration
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
            
            # Buffer configuration
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
        }
    }
}